services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_app
      MB_DB_PORT: 5432
      MB_DB_USER: metabase_user
      MB_DB_PASS: secure_password_here
      MB_DB_HOST: postgres
    depends_on:
      - postgres
    restart: always
    volumes:
      - metabase_data:/metabase.db

  postgres:
    image: postgres:15
    container_name: metabase_postgres
    environment:
      POSTGRES_USER: metabase_user
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: metabase_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  metabase_data:
  postgres_data: